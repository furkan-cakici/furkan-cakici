name: GitHub Snake Game

on:
  # Her gün gece yarısı otomatik çalışır
  schedule:
    - cron: "0 0 * * *"
  
  # Manuel tetikleme sağlar
  workflow_dispatch:
  
  # Main branch'e push yapıldığında çalışır
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write # Dosyaları branch'e geri yazabilmek için bu izin şarttır
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Step 1: Depoyu kontrol et (Checkout)
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Yılan animasyonlarını oluştur
      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Oluşturulan dosyaları 'output' branch'ine yükle
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output # Animasyonlar bu branch'te saklanacak
          commit_message: "Update snake animation [skip ci]"
